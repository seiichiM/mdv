<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル Markdown ビュアー</title>
    <!-- Tailwind CSS & Typographyプラグイン (文章を美しく装飾するため) -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js (MarkdownをHTMLに変換するライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
        /* ドラッグ＆ドロップでファイルが上に来た時の背景色 */
        .dragover { background-color: #e2e8f0 !important; }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col transition-colors duration-200" id="dropZone">

    <!-- ヘッダー (印刷時には非表示になります) -->
    <header class="bg-gray-800 text-white p-3 flex justify-between items-center shadow-md print:hidden sticky top-0 z-10">
        <h1 class="text-lg md:text-xl font-bold flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <span id="headerTitle">Markdown Viewer</span>
        </h1>
        <div class="flex items-center gap-4">
            <!-- ファイル選択用 (非表示にしてラベルから呼び出す) -->
            <input type="file" id="fileInput" accept=".md,.txt,.markdown" class="hidden" />
            <label for="fileInput" class="bg-blue-600 hover:bg-blue-500 text-sm px-4 py-2 rounded cursor-pointer transition shadow flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                ファイルを開く
            </label>
        </div>
    </header>

    <!-- メインコンテンツ (ここにプレビューが表示されます) -->
    <main class="flex-grow p-4 md:p-8 flex justify-center relative">
        
        <!-- 初期表示のメッセージ -->
        <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p class="text-xl font-bold mb-2">.md ファイルをここにドロップ</p>
            <p class="text-sm">または右上のボタンから選択してください</p>
        </div>

        <!-- プレビュー表示エリア (最初は非表示) -->
        <!-- max-w-3xl でドキュメントが読みやすい適度な幅に制限しています -->
        <div id="preview" class="prose prose-slate md:prose-lg w-full max-w-3xl bg-white p-8 md:p-12 shadow-sm rounded-lg border border-gray-200 hidden print:shadow-none print:border-none print:p-0">
            <!-- マークダウンの変換結果がここに入ります -->
        </div>

    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const placeholder = document.getElementById('placeholder');
        const preview = document.getElementById('preview');
        const headerTitle = document.getElementById('headerTitle');

        // Marked.js の設定（改行対応など）
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // ----------------------------------------------------
        // ファイルを読み込んで画面に表示する関数
        // ----------------------------------------------------
        function loadFile(file) {
            // 拡張子の簡易チェック (テキスト形式のファイルか)
            if (!file.name.match(/\.(md|txt|markdown)$/i)) {
                alert('Markdownファイル（.md）を選択してください。');
                return;
            }

            const reader = new FileReader();
            
            // ファイルの読み込みが完了したときの処理
            reader.onload = function(e) {
                const text = e.target.result;
                
                // マークダウンをHTMLに変換してセット
                preview.innerHTML = marked.parse(text);
                
                // 表示の切り替え
                placeholder.classList.add('hidden');
                preview.classList.remove('hidden');
                
                // ヘッダーにファイル名を表示
                headerTitle.textContent = file.name;
                
                // 一番上にスクロール
                window.scrollTo(0, 0);
            };

            // テキストとしてファイルを読み込む
            reader.readAsText(file);
        }

        // ----------------------------------------------------
        // 1. 「ファイルを開く」ボタンから選択された時の処理
        // ----------------------------------------------------
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                loadFile(file);
            }
            // 同じファイルを再度選べるようにリセットしておく
            this.value = ''; 
        });

        // ----------------------------------------------------
        // 2. ドラッグ＆ドロップされた時の処理
        // ----------------------------------------------------
        // ファイルが画面上に入ってきた時
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault(); // ブラウザのデフォルトの挙動（ファイルを開いてしまう）を防ぐ
            dropZone.classList.add('dragover'); // 背景色を変えてフィードバック
        });

        // ファイルが画面上から出た時
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        // ファイルがドロップされた時
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const file = e.dataTransfer.files[0];
            if (file) {
                loadFile(file);
            }
        });
    </script>
</body>
</html>
